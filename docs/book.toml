[book]
title = "ferro Documentation"
authors = ["ferro developers"]
language = "en"
src = "src"

[output.html]
mathjax-support = true

[output.pandoc]
hosted-html = "https://ferro.github.io/ferro"

[output.pandoc.profile.pdf]
output-file = "ferro.pdf"
to = "latex"
pdf-engine = "xelatex"

[output.pandoc.profile.pdf.variables]
fontsize = "11pt"
geometry = "margin=2.5cm"
colorlinks = true
linkcolor = "NavyBlue"
urlcolor = "NavyBlue"
toc = true
toc-depth = 3
numbersections = true
